<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Piggy bank body -->
  <ellipse cx="260" cy="295" rx="130" ry="105" fill="#e0e7ff" opacity="0.95"/>
  <!-- Piggy head -->
  <ellipse cx="160" cy="260" rx="60" ry="55" fill="#e0e7ff" opacity="0.95"/>
  <!-- Piggy snout -->
  <ellipse cx="118" cy="270" rx="28" ry="20" fill="#c7d2fe"/>
  <!-- Nostrils -->
  <ellipse cx="110" cy="268" rx="5" ry="4" fill="#818cf8"/>
  <ellipse cx="126" cy="268" rx="5" ry="4" fill="#818cf8"/>
  <!-- Eye -->
  <circle cx="155" cy="245" r="8" fill="#312e81"/>
  <circle cx="157" cy="243" r="3" fill="white"/>
  <!-- Ear -->
  <ellipse cx="175" cy="215" rx="22" ry="28" fill="#c7d2fe" transform="rotate(-15 175 215)"/>
  <ellipse cx="175" cy="218" rx="12" ry="18" fill="#a5b4fc" transform="rotate(-15 175 218)"/>
  <!-- Legs -->
  <rect x="195" y="370" width="30" height="40" rx="10" fill="#c7d2fe"/>
  <rect x="290" y="370" width="30" height="40" rx="10" fill="#c7d2fe"/>
  <!-- Tail (curly) -->
  <path d="M385 280 Q405 260 395 240 Q385 220 400 210" stroke="#c7d2fe" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Coin slot on top -->
  <rect x="230" y="182" width="60" height="10" rx="5" fill="#6366f1"/>
  <!-- Coin going in -->
  <circle cx="260" cy="155" r="32" fill="url(#coin)" stroke="#d97706" stroke-width="3"/>
  <text x="260" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#92400e">$</text>
  <!-- Sparkles around coin -->
  <path d="M310 130 L315 120 L320 130 L315 140Z" fill="white" opacity="0.8"/>
  <path d="M215 120 L218 112 L221 120 L218 128Z" fill="white" opacity="0.6"/>
  <circle cx="300" cy="150" r="4" fill="white" opacity="0.7"/>
</svg>
